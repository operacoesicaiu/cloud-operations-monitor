name: Remote Log Handler

on:
  repository_dispatch:
    types: [log_event]

jobs:
  update-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write Execution Log
        env:
          LOG_MESSAGE: ${{ github.event.client_payload.message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          
          touch daily_uptime.log
          # O uso da variável de ambiente $LOG_MESSAGE aqui é mais seguro que a substituição direta via ${{ }}
          echo "[$TIMESTAMP] [SUCCESS] $LOG_MESSAGE" >> daily_uptime.log
          
          git add daily_uptime.log
          
          git diff --quiet && git diff --staged --quiet || ( \
            git commit -m "infra: operations pulse check $TIMESTAMP" && \
            git push \
          )
